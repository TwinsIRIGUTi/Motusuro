<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>THUNDER MOTSU - FINAL VERSION</title>
  <style>
    /* CSSも統合して1つのHTMLで動くようにしています */
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    body { background: #000; margin: 0; display: flex; justify-content: center; height: 100vh; font-family: sans-serif; overflow: hidden; color: white; }
    .app { width: 100vw; height: 100vh; max-width: 480px; background: #1a1a1a; display: flex; flex-direction: column; padding: 10px; border: 2px solid #333; }
    .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #000; border-radius: 8px; margin-bottom: 5px; }
    .lamp { color: #300; font-size: 20px; font-weight: bold; }
    .lamp.on { color: #f00; text-shadow: 0 0 15px #f00; }
    .credit { color: #0f0; font-size: 22px; }
    .slot-frame { display: flex; height: 240px; background: #000; border: 4px solid #444; position: relative; overflow: hidden; border-radius: 10px; }
    .reel-window { flex: 1; border-right: 1px solid #222; position: relative; }
    .reel-strip { position: absolute; width: 100%; top: 0; }
    .symbol { width: 100%; height: 80px; background-size: 65px; background-repeat: no-repeat; background-position: center; }
    .msg-area { height: 40px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #ff0; font-weight: bold; }
    .controls { margin-top: auto; padding-bottom: 20px; }
    .btn-start { width: 100%; height: 80px; background: #d32f2f; color: #fff; font-size: 24px; border-radius: 15px; border: none; margin-bottom: 15px; box-shadow: 0 5px #7b241c; }
    .btn-start:active { transform: translateY(3px); box-shadow: none; }
    .stop-btns { display: flex; gap: 8px; }
    .btn-stop { flex: 1; height: 90px; background: #616161; color: #fff; font-size: 28px; border-radius: 10px; border: none; box-shadow: 0 4px #212121; }
    .btn-stop:disabled { background: #222; color: #444; box-shadow: none; }
    .flash-win { animation: win-blink 0.1s steps(2) 5; }
    @keyframes win-blink { 0% { background: #1a1a1a; } 100% { background: #444; } }
  </style>
</head>
<body>
  <div class="app" id="main-panel">
    <div class="status-bar">
      <div id="bonus-lamp" class="lamp">BONUS</div>
      <div class="credit">MEDAL: <span id="score">100</span></div>
    </div>
    <div class="slot-frame">
      <div class="reel-window"><div id="reel1" class="reel-strip"></div></div>
      <div class="reel-window"><div id="reel2" class="reel-strip"></div></div>
      <div class="reel-window"><div id="reel3" class="reel-strip"></div></div>
    </div>
    <div id="message" class="msg-area">READY</div>
    <div class="controls">
      <button id="lever" class="btn-start">レバーON</button>
      <div class="stop-btns">
        <button id="stop1" class="btn-stop" disabled>左</button>
        <button id="stop2" class="btn-stop" disabled>中</button>
        <button id="stop3" class="btn-stop" disabled>右</button>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
