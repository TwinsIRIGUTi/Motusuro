<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>THUNDER MOTSU - Test Play</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="game-container" id="panel">
    <div class="header-logo">THUNDER MOTSU</div>
    
    <div class="slot-container">
      <div class="reel-window" id="window1"><div class="reel" id="reel1"></div></div>
      <div class="reel-window" id="window2"><div class="reel" id="reel2"></div></div>
      <div class="reel-window" id="window3"><div class="reel" id="reel3"></div></div>
    </div>

    <div id="message" class="message">INSERT MEDAL</div>
    
    <div class="controls">
      <button id="lever" class="lever-btn">LEVER ON</button>
      <div class="stop-btns">
        <button id="stop1" class="stop-button" disabled>STOP 1</button>
        <button id="stop2" class="stop-button" disabled>STOP 2</button>
        <button id="stop3" class="stop-button" disabled>STOP 3</button>
      </div>
    </div>
    
    <div class="display-panel">
      <div id="score">CREDIT: 100</div>
      <div id="bonus-lamp">BONUS</div>
    </div>
  </div>

  <audio id="se-lever" src="sounds/lever.mp3"></audio>
  <audio id="se-notice" src="sounds/notice.mp3"></audio>
  <audio id="se-stop" src="sounds/stop.mp3"></audio>
  <audio id="se-replay" src="sounds/replay.mp3"></audio>
  <audio id="se-hit" src="sounds/payout.mp3"></audio>
  <audio id="se-big" src="sounds/big_bonus.mp3"></audio>

  <script src="script.js"></script>
</body>
</html>
