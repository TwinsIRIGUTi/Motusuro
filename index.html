<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MOTSU-SLO Mobile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <div class="status-top">
      <div class="credit-display">クレジット: <span id="score">100</span></div>
    </div>
    
    <div class="slot-frame">
      <div class="reel-container"><div id="reel1" class="reel-strip"></div></div>
      <div class="reel-container"><div id="reel2" class="reel-strip"></div></div>
      <div class="reel-container"><div id="reel3" class="reel-strip"></div></div>
      <div class="guide-lines">
        <div class="line middle"></div>
      </div>
    </div>

    <div id="message" class="msg-area"></div>

    <div class="controls">
      <button id="lever" class="btn-start">スタート</button>
      <div class="stop-group">
        <button id="stop1" class="btn-stop" disabled>左</button>
        <button id="stop2" class="btn-stop" disabled>中</button>
        <button id="stop3" class="btn-stop" disabled>右</button>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
