<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THUNDER MOTSU - Thunder V Simulator</title>
    <style>
        /* 基本レイアウト */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        body { background: #000; margin: 0; display: flex; justify-content: center; height: 100vh; font-family: 'Hiragino Kaku Gothic ProN', sans-serif; overflow: hidden; color: white; }

        .app { width: 100vw; height: 100vh; max-width: 480px; background: #1a1a1a; display: flex; flex-direction: column; padding: 10px; border: 2px solid #333; position: relative; }

        /* ステータス表示 */
        .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #000; border-radius: 8px; margin-bottom: 5px; border: 1px solid #444; }
        .lamp { color: #300; font-size: 20px; font-weight: bold; font-style: italic; transition: 0.2s; }
        .lamp.on { color: #f00; text-shadow: 0 0 15px #f00, 0 0 5px #fff; }
        .credit { color: #0f0; font-size: 24px; font-family: 'Courier New', monospace; }

        /* リールエリア & 消灯・フラッシュ演出 */
        .slot-frame { 
            display: flex; height: 240px; background: #000; border: 6px solid #555; 
            position: relative; overflow: hidden; border-radius: 10px; 
            box-shadow: inset 0 0 20px #000;
            transition: background 0.1s;
        }
        
        /* フラッシュ用のアニメーション */
        @keyframes flash-white {
            0%, 100% { background: #000; }
            50% { background: rgba(255, 255, 255, 0.8); }
        }
        @keyframes flash-v {
            0% { box-shadow: inset 0 0 0px #fff; }
            50% { box-shadow: inset 0 0 80px #fff, 0 0 30px #fff; background: rgba(255,255,255,0.5); }
            100% { box-shadow: inset 0 0 0px #fff; }
        }
        .slot-frame.flash-active { animation: flash-white 0.1s ease-in-out 3; }
        .slot-frame.flash-v-active { animation: flash-v 0.15s ease-in-out 4; }

        .reel-window { 
            flex: 1; border-right: 2px solid #222; position: relative; 
            background: rgba(255,255,255,0.05); transition: background 0.1s;
        }
        /* 消灯演出 */
        .reel-window.dark { background: rgba(0, 0, 0, 0.85); }

        .reel-strip { position: absolute; width: 100%; top: 0; transition: transform 0.05s linear; }
        .symbol { width: 100%; height: 80px; background-size: 60px; background-repeat: no-repeat; background-position: center; border-bottom: 1px solid rgba(255,255,255,0.05); }

        /* メッセージエリア */
        .msg-area { height: 50px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #ffff00; font-weight: bold; text-align: center; }

        /* 操作パネル */
        .controls { margin-top: auto; padding-bottom: 20px; }
        .btn-start { 
            width: 100%; height: 80px; background: linear-gradient(#f44336, #b71c1c); 
            color: #fff; font-size: 24px; font-weight: bold; border-radius: 15px; 
            border: none; margin-bottom: 15px; box-shadow: 0 6px #7b241c; cursor: pointer; 
        }
        .btn-start:active { transform: translateY(4px); box-shadow: none; }

        .stop-btns { display: flex; gap: 10px; }
        .btn-stop { 
            flex: 1; height: 90px; background: linear-gradient(#9e9e9e, #424242); 
            color: #fff; font-size: 32px; font-weight: bold; border-radius: 12px; 
            border: none; box-shadow: 0 5px #212121; 
        }
        .btn-stop:active:not(:disabled) { transform: translateY(2px); box-shadow: none; }
        .btn-stop:disabled { background: #333; color: #555; box-shadow: none; }
    </style>
</head>
<body>

<div class="app">
    <div class="status-bar">
        <div id="bonus-lamp" class="lamp">BONUS</div>
        <div class="credit">CREDIT: <span id="score">100</span></div>
    </div>

    <div class="slot-frame" id="main-frame">
        <div class="reel-window"><div id="reel1" class="reel-strip"></div></div>
        <div class="reel-window"><div id="reel2" class="reel-strip"></div></div>
        <div class="reel-window"><div id="reel3" class="reel-strip"></div></div>
    </div>

    <div class="msg-area" id="message"></div>

    <div class="controls">
        <button class="btn-start" id="lever">LEVER ON / START</button>
        <div class="stop-btns">
            <button class="btn-stop" id="stop1" disabled>1</button>
            <button class="btn-stop" id="stop2" disabled>2</button>
            <button class="btn-stop" id="stop3" disabled>3</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
