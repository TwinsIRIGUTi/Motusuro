<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>THUNDER MOTSU - COMPLETE EDITION</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    body { background: #000; margin: 0; display: flex; justify-content: center; height: 100vh; font-family: 'Hiragino Kaku Gothic ProN', sans-serif; overflow: hidden; color: white; }
    
    .app { width: 100vw; height: 100vh; max-width: 480px; background: #1a1a1a; display: flex; flex-direction: column; padding: 10px; border: 2px solid #333; position: relative; }
    
    /* ステータス・ランプ */
    .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #000; border-radius: 8px; margin-bottom: 5px; border: 1px solid #444; }
    .lamp { color: #300; font-size: 20px; font-weight: bold; font-style: italic; transition: 0.2s; }
    .lamp.on { color: #f00; text-shadow: 0 0 15px #f00, 0 0 5px #fff; }
    .credit { color: #0f0; font-size: 24px; font-family: 'Courier New', monospace; }

    /* リールエリア */
    .slot-frame { display: flex; height: 240px; background: #000; border: 6px solid #555; position: relative; overflow: hidden; border-radius: 10px; box-shadow: inset 0 0 20px #000; }
    .reel-window { flex: 1; border-right: 2px solid #222; position: relative; }
    .reel-strip { position: absolute; width: 100%; top: 0; }
    .symbol { width: 100%; height: 80px; background-size: 65px; background-repeat: no-repeat; background-position: center; border-bottom: 1px solid rgba(255,255,255,0.05); }

    /* メッセージ・告知 */
    .msg-area { height: 50px; display: flex; align-items: center; justify-content: center; font-size: 22px; color: #ffff00; font-weight: bold; text-align: center; text-shadow: 2px 2px 4px #000; }
    
    /* 操作系 */
    .controls { margin-top: auto; padding-bottom: 25px; }
    .btn-start { width: 100%; height: 85px; background: linear-gradient(#f44336, #b71c1c); color: #fff; font-size: 26px; font-weight: bold; border-radius: 20px; border: none; margin-bottom: 15px; box-shadow: 0 6px #7b241c; cursor: pointer; }
    .btn-start:active { transform: translateY(4px); box-shadow: none; }
    
    .stop-btns { display: flex; gap: 10px; }
    .btn-stop { flex: 1; height: 100px; background: linear-gradient(#9e9e9e, #424242); color: #fff; font-size: 32px; font-weight: bold; border-radius: 15px; border: none; box-shadow: 0 5px #212121; }
    .btn-stop:active:not(:disabled) { transform: translateY(2px); box-shadow: none; }
    .btn-stop:disabled { background: #333; color: #555; box-shadow: none; }

    /* 演出用 */
    .flash-win { animation: win-blink 0.1s steps(2) 4; }
    @keyframes win-blink { 0% { background: #1a1a1a; } 100% { background: #555; } }
  </style>
</head>
<body>
  <div class="app" id="main-panel">
    <div class="status-bar">
      <div id="bonus-lamp" class="lamp">BONUS</div>
      <div class="credit">MEDAL: <span id="score">100</span></div>
    </div>

    <div class="slot-frame">
      <div class="reel-window"><div id="reel1" class="reel-strip"></div></div>
      <div class="reel-window"><div id="reel2" class="reel-strip"></div></div>
      <div class="reel-window"><div id="reel3" class="reel-strip"></div></div>
    </div>

    <div id="message" class="msg-area">READY</div>

    <div class="controls">
      <button id="lever" class="btn-start">レバーON</button>
      <div class="stop-btns">
        <button id="stop1" class="btn-stop" disabled>左</button>
        <button id="stop2" class="btn-stop" disabled>中</button>
        <button id="stop3" class="btn-stop" disabled>右</button>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
